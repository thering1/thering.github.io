<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { width: 100%; background: white; padding-top: 20px; z-index: 100; text-align: center; flex-shrink: 0; }
        h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .black-line { width: 90%; height: 6px; background: black; margin: 15px auto 0; }

        .main-container { display: flex; flex-grow: 1; overflow: hidden; width: 100%; }
        #feed { width: 400px; display: flex; flex-direction: column; align-items: flex-start; overflow-y: auto; padding: 20px 20px 150px 5%; gap: 30px; border-right: 2px solid #eee; }
        .post-image { width: 300px; height: 300px; object-fit: cover; border: 3px solid #000; cursor: pointer; }

        #preview-area { flex-grow: 1; display: flex; padding: 20px; gap: 20px; background: #fafafa; overflow: hidden; position: relative; }
        #upscaled-image { max-width: 65%; max-height: 80vh; object-fit: contain; border: 5px solid black; background: white; display: none; cursor: crosshair; }
        
        #comment-section { flex-grow: 1; display: none; flex-direction: column; max-width: 30%; border-left: 2px solid black; padding-left: 15px; }
        #comment-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.9rem; }
        .comment-item { padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; }
        
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; border-top: 3px solid black; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .post-btn { background: black; color: white; border: none; padding: 12px 40px; font-weight: bold; cursor: pointer; font-family: inherit; }
        
        /* ADMIN UI */
        #admin-login-btn { position: fixed; bottom: 20px; right: 20px; background: black; color: white; border: none; padding: 10px; font-size: 10px; cursor: pointer; z-index: 2000; font-family: inherit; }
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid black; padding: 20px; z-index: 3000; width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 20px 20px 0px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 5px; text-align: left; }
        .admin-tab-btn { background: #eee; border: 1px solid black; padding: 5px; cursor: pointer; margin-right: 5px; }
        .active-tab { background: black; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div class="main-container">
        <div id="feed"></div>
        <div id="preview-area">
            <img id="upscaled-image" src="" alt="Selected" oncontextmenu="handleRightClick(event)">
            <div id="comment-section">
                <div id="reply-ui">
                    <input type="text" id="replyInput" placeholder="ENTER REPLY..." style="width:90%; padding:5px; border:2px solid black; font-family:inherit;">
                    <button class="post-btn" id="replyBtn" style="padding: 5px; margin-top:5px; width:95%;">REPLY</button>
                </div>
                <div id="comment-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" id="postBtn">ACCOUNT ACCESS</button>
    </div>

    <button id="admin-login-btn" onclick="toggleAdminModal()">LOG IN</button>

    <div id="admin-modal">
        <div id="login-form">
            <h3>SIGN IN</h3>
            <input type="text" id="adminUser" placeholder="Username" style="padding:5px; border:2px solid black;"><br><br>
            <input type="password" id="adminPass" placeholder="Password" style="padding:5px; border:2px solid black;"><br><br>
            <button onclick="attemptLogin()" class="post-btn" style="padding:10px;">LOGIN</button>
            <button onclick="toggleAdminModal()" style="border:none; background:none; cursor:pointer; text-decoration:underline;">Cancel</button>
        </div>

        <div id="admin-tools" style="display:none;">
            <div style="display:flex; justify-content: space-between;">
                <h3 id="user-welcome"></h3>
                <button onclick="logout()" style="background:red; color:white; border:none; cursor:pointer;">LOGOUT</button>
            </div>
            
            <div id="tab-buttons" style="margin: 15px 0;">
                <button class="admin-tab-btn active-tab" onclick="showTab('accounts')">Accounts</button>
                <button class="admin-tab-btn" onclick="showTab('audit')">Audit Log</button>
            </div>

            <div id="tab-accounts">
                <h4>ADD ACCOUNT</h4>
                <input type="text" id="newDisp" placeholder="Display Name"><br>
                <input type="text" id="newUser" placeholder="Username"><br>
                <input type="text" id="newPass" placeholder="Password"><br>
                <button onclick="addAccount()" style="margin-top:5px;">CREATE STUDENT</button>
                <hr>
                <h4>MANAGE ACCOUNTS</h4>
                <table id="accounts-table">
                    <thead><tr><th>Disp</th><th>User</th><th>Pass</th><th>Rank</th></tr></thead>
                    <tbody id="accounts-body"></tbody>
                </table>
            </div>

            <div id="tab-audit" style="display:none;">
                <h4>ACTION LOG</h4>
                <table id="audit-table">
                    <thead><tr><th>Admin</th><th>Action</th><th>Target</th><th>Time</th></tr></thead>
                    <tbody id="audit-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off, remove, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postsRef = ref(db, 'posts');
        
        let currentUser = null;
        let currentPostId = null;
        let currentCommentRef = null;

        window.toggleAdminModal = () => {
            const modal = document.getElementById('admin-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        };

        window.showTab = (tab) => {
            document.getElementById('tab-accounts').style.display = tab === 'accounts' ? 'block' : 'none';
            document.getElementById('tab-audit').style.display = tab === 'audit' ? 'block' : 'none';
            document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active-tab'));
            event.target.classList.add('active-tab');
            if(tab === 'audit') loadAudit();
        };

        window.attemptLogin = async () => {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const userSnap = await get(ref(db, `users/${user}`));
            if (userSnap.exists() && userSnap.val().password === pass) {
                currentUser = userSnap.val();
                currentUser.username = user;
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('user-welcome').innerText = `${currentUser.display_name} [${currentUser.rank}]`;
                loadAccounts();
            } else { alert("Access Denied"); }
        };

        window.logout = () => { location.reload(); };

        window.addAccount = () => {
            const user = document.getElementById('newUser').value;
            if(!user) return;
            set(ref(db, `users/${user}`), {
                display_name: document.getElementById('newDisp').value,
                password: document.getElementById('newPass').value,
                rank: 'Student'
            });
            alert("Student Registered.");
        };

        function loadAccounts() {
            onValue(ref(db, 'users'), (snap) => {
                const body = document.getElementById('accounts-body');
                body.innerHTML = '';
                snap.forEach(child => {
                    const u = child.val();
                    body.innerHTML += `<tr>
                        <td><input onchange="window.updateU('${child.key}','display_name',this.value)" value="${u.display_name}"></td>
                        <td>${child.key}</td>
                        <td><input onchange="window.updateU('${child.key}','password',this.value)" value="${u.password}"></td>
                        <td><input onchange="window.updateU('${child.key}','rank',this.value)" value="${u.rank}"></td>
                    </tr>`;
                });
            });
        }

        window.updateU = (key, field, val) => set(ref(db, `users/${key}/${field}`), val);

        function logAction(action, target) {
            push(ref(db, 'audit_log'), {
                admin: currentUser.display_name,
                action: action,
                target: target,
                time: new Date().toLocaleString()
            });
        }

        function loadAudit() {
            onValue(ref(db, 'audit_log'), (snap) => {
                const body = document.getElementById('audit-body');
                body.innerHTML = '';
                snap.forEach(child => {
                    const l = child.val();
                    body.innerHTML = `<tr><td>${l.admin}</td><td>${l.action}</td><td>${l.target}</td><td>${l.time}</td></tr>` + body.innerHTML;
                });
            });
        }

        // --- CORE FUNCTIONS ---
        onChildAdded(postsRef, (snap) => {
            const img = document.createElement('img');
            img.src = snap.val().image;
            img.className = 'post-image';
            img.id = `thumb-${snap.key}`;
            img.onclick = () => openPreview(snap.val().image, snap.key);
            document.getElementById('feed').appendChild(img);
        });

        window.handleRightClick = (e) => {
            e.preventDefault();
            if (!currentUser || !['Lord', 'Maestro'].includes(currentUser.rank)) return;
            if (confirm("Erase image and all comments?")) {
                logAction("DELETED IMAGE", currentPostId);
                remove(ref(db, `posts/${currentPostId}`));
                remove(ref(db, `comments/${currentPostId}`));
                document.getElementById(`thumb-${currentPostId}`).remove();
                document.getElementById('upscaled-image').style.display = 'none';
                document.getElementById('comment-section').style.display = 'none';
            }
        };

        function openPreview(url, id) {
            currentPostId = id;
            document.getElementById('upscaled-image').src = url;
            document.getElementById('upscaled-image').style.display = 'block';
            document.getElementById('comment-section').style.display = 'flex';
            const list = document.getElementById('comment-list');
            list.innerHTML = '';
            if (currentCommentRef) off(currentCommentRef);
            currentCommentRef = ref(db, `comments/${id}`);
            onChildAdded(currentCommentRef, (snap) => {
                const c = snap.val();
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = c.rank ? `<b>> ${c.display_name}, ${c.rank} of the Ring:</b> ${c.text}` : `> ${c.text}`;
                div.onclick = () => {
                    if (currentUser && ['Lord', 'Maestro'].includes(currentUser.rank)) {
                        if (confirm("Erase comment?")) {
                            logAction("DELETED COMMENT", c.text.substring(0,20));
                            remove(ref(db, `comments/${id}/${snap.key}`));
                            div.remove();
                        }
                    }
                };
                list.prepend(div);
            });
        }

        window.postReply = () => {
            const text = document.getElementById('replyInput').value;
            if (!text || !currentPostId) return;
            const p = { text, timestamp: Date.now() };
            if (currentUser) { p.display_name = currentUser.display_name; p.rank = currentUser.rank; }
            push(ref(db, `comments/${currentPostId}`), p);
            document.getElementById('replyInput').value = '';
        };

        document.getElementById('postBtn').onclick = () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => push(postsRef, { image: e.target.result, timestamp: Date.now() });
            reader.readAsDataURL(file);
        };
        document.getElementById('replyBtn').onclick = window.postReply;
    </script>
</body>
</html>
