<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { width: 100%; background: white; padding-top: 20px; z-index: 100; text-align: center; flex-shrink: 0; }
        h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .black-line { width: 90%; height: 6px; background: black; margin: 15px auto 0; }

        .main-container { display: flex; flex-grow: 1; overflow: hidden; width: 100%; }
        #feed { width: 400px; display: flex; flex-direction: column; align-items: flex-start; overflow-y: auto; padding: 20px 20px 150px 5%; gap: 30px; border-right: 2px solid #eee; }
        .post-image { width: 300px; height: 300px; object-fit: cover; border: 3px solid #000; cursor: pointer; flex-shrink: 0; }

        #preview-area { flex-grow: 1; display: flex; padding: 20px; gap: 20px; background: #fafafa; overflow: hidden; position: relative; }
        #upscaled-image { max-width: 65%; max-height: 80vh; object-fit: contain; border: 5px solid black; background: white; display: none; cursor: crosshair; }
        
        #comment-section { flex-grow: 1; display: none; flex-direction: column; max-width: 30%; border-left: 2px solid black; padding-left: 15px; }
        #comment-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.9rem; }
        .comment-item { padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; }
        
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; border-top: 3px solid black; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .post-btn { background: black; color: white; border: none; padding: 12px 40px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .post-btn:disabled { background: #666; cursor: not-allowed; }
        
        #auth-btn { position: fixed; bottom: 20px; right: 20px; background: black; color: white; border: none; padding: 10px 20px; font-size: 12px; cursor: pointer; z-index: 2000; font-family: inherit; font-weight: bold; }
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid black; padding: 20px; z-index: 3000; width: 550px; max-height: 85vh; overflow-y: auto; box-shadow: 20px 20px 0px rgba(0,0,0,0.2); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 5px; text-align: left; }
        .admin-tab-btn { background: #eee; border: 1px solid black; padding: 5px; cursor: pointer; margin-right: 5px; }
        .active-tab { background: black; color: white; }
        .input-box { padding: 5px; border: 2px solid black; font-family: inherit; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div class="main-container">
        <div id="feed"></div>
        <div id="preview-area">
            <img id="upscaled-image" src="" alt="Selected" oncontextmenu="handleBigImageRightClick(event)">
            <div id="comment-section">
                <div id="reply-ui">
                    <input type="text" id="replyInput" placeholder="ENTER REPLY..." style="width:90%;" class="input-box">
                    <button class="post-btn" id="replyBtn" style="padding: 5px; width:95%;">REPLY</button>
                </div>
                <div id="comment-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" id="postBtn">POST IMAGE</button>
    </div>

    <button id="auth-btn" onclick="handleAuthClick()">SIGN IN</button>

    <div id="admin-modal">
        <div id="login-form">
            <h3>SIGN IN</h3>
            <input type="text" id="adminUser" placeholder="Username" class="input-box"><br>
            <input type="password" id="adminPass" placeholder="Password" class="input-box"><br>
            <button onclick="attemptLogin()" class="post-btn">LOGIN</button>
            <button onclick="toggleModal()" style="border:none; background:none; cursor:pointer; text-decoration:underline; margin-left:10px;">Cancel</button>
        </div>

        <div id="admin-tools" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid black; padding-bottom: 10px;">
                <h3 id="user-welcome" style="margin:0;"></h3>
                <div>
                    <button onclick="toggleModal()" style="background:#eee; border:2px solid black; padding: 5px 10px; cursor:pointer; font-family: inherit; font-weight:bold;">COLLAPSE INFO</button>
                    <button onclick="logout()" style="background:red; color:white; border:none; padding: 5px 10px; cursor:pointer; font-family: inherit;">LOGOUT</button>
                </div>
            </div>
            
            <div id="lord-tabs" style="display:none; margin: 15px 0;">
                <button class="admin-tab-btn active-tab" onclick="showTab('accounts')">Accounts</button>
                <button class="admin-tab-btn" onclick="showTab('audit')">Audit Log</button>
                <button class="admin-tab-btn" onclick="showTab('bans')">Banned IDs</button>
            </div>

            <div id="tab-bans" style="display:none;">
                <h4>ACTIVE BANS</h4>
                <table id="bans-table">
                    <thead><tr><th>ID Fingerprint</th><th>Action</th></tr></thead>
                    <tbody id="bans-body"></tbody>
                </table>
            </div>

            <div id="tab-accounts" style="display:none;">
                 <h4>REGISTER NEW STUDENT</h4>
                <input type="text" id="newDisp" placeholder="Display Name" class="input-box">
                <input type="text" id="newUser" placeholder="Username" class="input-box">
                <input type="text" id="newPass" placeholder="Password" class="input-box">
                <button onclick="addAccount()" class="post-btn" style="padding:5px;">CREATE</button>
                <hr>
                <table id="accounts-table">
                    <thead><tr><th>Display</th><th>User</th><th>Pass</th><th>Rank</th></tr></thead>
                    <tbody id="accounts-body"></tbody>
                </table>
            </div>
            <div id="tab-audit" style="display:none;">
                <h4>ACTION LOG</h4>
                <table id="audit-table">
                    <thead><tr><th>Admin</th><th>Action</th><th>Target</th><th>Time</th></tr></thead>
                    <tbody id="audit-body"></tbody>
                </table>
            </div>
            <div id="student-view" style="display:none; margin-top: 20px;">
                <p>Status: Verified Member of The Ring.</p>
                <input type="password" id="changePass" placeholder="New Password" class="input-box">
                <button onclick="updateOwnPassword()" class="post-btn" style="padding:5px;">SAVE NEW PASSWORD</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off, remove, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // --- CORE VARIABLES ---
        let currentUser = null;
        let currentPostId = null;
        let currentCommentRef = null;
        const myFingerprint = btoa(navigator.userAgent + navigator.language).substring(0, 16);

        // --- BAN SYSTEM ---
        async function isBanned() {
            const snap = await get(ref(db, `bans/${myFingerprint}`));
            return snap.exists();
        }

        window.banUser = (fingerprint) => {
            if (currentUser.rank !== 'Lord') return;
            set(ref(db, `bans/${fingerprint}`), true);
            logAction("BANNED USER", fingerprint);
            alert("User Banned.");
        };

        window.unbanUser = (fingerprint) => {
            remove(ref(db, `bans/${fingerprint}`));
            alert("Unbanned.");
        };

        // --- POSTING LOGIC WITH DUPLICATE & TIMER ---
        let cooldown = 0;
        const postBtn = document.getElementById('postBtn');

        async function startCooldown() {
            cooldown = 120;
            postBtn.disabled = true;
            const timer = setInterval(() => {
                cooldown--;
                postBtn.innerText = `COOLDOWN [${cooldown}s]`;
                if (cooldown <= 0) {
                    clearInterval(timer);
                    postBtn.disabled = false;
                    postBtn.innerText = "POST IMAGE";
                }
            }, 1000);
        }

        window.postImage = async () => {
            if (await isBanned()) return alert("You are banned from posting.");
            const file = document.getElementById('imageInput').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const imageData = e.target.result;
                
                // Duplicate check
                const snap = await get(ref(db, 'posts'));
                let isDuplicate = false;
                snap.forEach(child => { if(child.val().image === imageData) isDuplicate = true; });

                if(isDuplicate) {
                    alert("This image has already been posted.");
                    return;
                }

                push(ref(db, 'posts'), { 
                    image: imageData, 
                    timestamp: Date.now(), 
                    posterId: myFingerprint 
                });
                startCooldown();
            };
            reader.readAsDataURL(file);
        };

        // --- LORD FEED MODERATION ---
        window.handleMiniatureRightClick = (e, postId, posterId) => {
            e.preventDefault();
            if (!currentUser || currentUser.rank !== 'Lord') return;
            if (confirm(`LORD ACTION: Ban poster of this image? (ID: ${posterId})`)) {
                window.banUser(posterId);
            }
        };

        onChildAdded(ref(db, 'posts'), (snap) => {
            const data = snap.val();
            const img = document.createElement('img');
            img.src = data.image;
            img.className = 'post-image';
            img.id = `thumb-${snap.key}`;
            img.onclick = () => openPreview(data.image, snap.key);
            // Miniature Right Click for Lord
            img.oncontextmenu = (e) => window.handleMiniatureRightClick(e, snap.key, data.posterId);
            document.getElementById('feed').prepend(img);
        });

        // --- TAB & MODAL LOGIC ---
        window.showTab = (tab) => {
            ['accounts', 'audit', 'bans'].forEach(t => document.getElementById(`tab-${t}`).style.display = 'none');
            document.getElementById(`tab-${tab}`).style.display = 'block';
            if(tab === 'bans') loadBans();
            if(tab === 'audit') loadAudit();
            if(tab === 'accounts') loadAccounts();
        };

        function loadBans() {
            onValue(ref(db, 'bans'), (snap) => {
                const body = document.getElementById('bans-body');
                body.innerHTML = '';
                snap.forEach(child => {
                    body.innerHTML += `<tr><td>${child.key}</td><td><button onclick="unbanUser('${child.key}')">UNBAN</button></td></tr>`;
                });
            });
        }

        // ... [Include previous functions for openPreview, attemptLogin, logout, addAccount, logAction etc. here] ...
        // (Function names kept identical to maintain compatibility)

        window.handleAuthClick = () => toggleModal();
        window.toggleModal = () => {
            const modal = document.getElementById('admin-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            updateMainButtonLabel();
        };
        
        function updateMainButtonLabel() {
            const btn = document.getElementById('auth-btn');
            const modal = document.getElementById('admin-modal');
            if (!currentUser) btn.innerText = "SIGN IN";
            else btn.innerText = modal.style.display === 'block' ? "COLLAPSE INFO" : "ACCOUNT INFO";
        }

        window.attemptLogin = async () => {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const snap = await get(ref(db, `users/${u}`));
            if (snap.exists() && snap.val().password === p) {
                currentUser = snap.val(); currentUser.username = u;
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('user-welcome').innerText = `${currentUser.display_name} [${currentUser.rank}]`;
                if (currentUser.rank === 'Lord') {
                    document.getElementById('lord-tabs').style.display = 'block';
                    showTab('accounts');
                } else { document.getElementById('student-view').style.display = 'block'; }
                updateMainButtonLabel();
            } else alert("Denied.");
        };

        window.logout = () => location.reload();

        window.handleBigImageRightClick = (e) => {
            e.preventDefault();
            if (!currentUser || !['Lord', 'Maestro'].includes(currentUser.rank)) return;
            if (confirm("Erase post?")) {
                remove(ref(db, `posts/${currentPostId}`));
                remove(ref(db, `comments/${currentPostId}`));
                document.getElementById(`thumb-${currentPostId}`).remove();
                document.getElementById('upscaled-image').style.display = 'none';
                document.getElementById('comment-section').style.display = 'none';
            }
        };

        function openPreview(url, id) {
            currentPostId = id;
            document.getElementById('upscaled-image').src = url;
            document.getElementById('upscaled-image').style.display = 'block';
            document.getElementById('comment-section').style.display = 'flex';
            const list = document.getElementById('comment-list');
            list.innerHTML = '';
            if (currentCommentRef) off(currentCommentRef);
            currentCommentRef = ref(db, `comments/${id}`);
            onChildAdded(currentCommentRef, (snap) => {
                const c = snap.val();
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = c.rank ? `<b>> ${c.display_name}, ${c.rank} of the Ring:</b> ${c.text}` : `> ${c.text}`;
                div.onclick = () => {
                    if (currentUser && ['Lord', 'Maestro', 'Docente'].includes(currentUser.rank)) {
                        if (confirm("Erase comment?")) remove(ref(db, `comments/${id}/${snap.key}`));
                    }
                };
                list.prepend(div);
            });
        }

        window.postReply = () => {
            const text = document.getElementById('replyInput').value;
            if (!text || !currentPostId) return;
            const p = { text, timestamp: Date.now() };
            if (currentUser) { p.display_name = currentUser.display_name; p.rank = currentUser.rank; }
            push(ref(db, `comments/${currentPostId}`), p);
            document.getElementById('replyInput').value = '';
        };

        function logAction(action, target) {
            push(ref(db, 'audit_log'), { admin: currentUser.display_name, action, target, time: new Date().toLocaleString() });
        }

        document.getElementById('postBtn').onclick = window.postImage;
        document.getElementById('replyBtn').onclick = window.postReply;

    </script>
</body>
</html>
