<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <link rel="icon" type="image/png" href="The_Ring_Icon.png">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { width: 100%; background: white; padding-top: 20px; z-index: 100; text-align: center; flex-shrink: 0; }
        h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .black-line { width: 90%; height: 6px; background: black; margin: 15px auto 0; }

        .main-container { display: flex; flex-grow: 1; overflow: hidden; width: 100%; }
        #feed { width: 400px; display: flex; flex-direction: column; align-items: flex-start; overflow-y: auto; padding: 20px 20px 150px 5%; gap: 30px; border-right: 2px solid #eee; scroll-behavior: smooth; }
        .post-image { width: 300px; height: 300px; object-fit: cover; border: 3px solid #000; cursor: pointer; flex-shrink: 0; background: #f9f9f9; }
        #sentinel { width: 100%; height: 50px; flex-shrink: 0; }

        #preview-area { flex-grow: 1; display: flex; padding: 20px; gap: 20px; background: #fafafa; overflow: hidden; position: relative; }
        #upscaled-image { max-width: 65%; max-height: 80vh; object-fit: contain; border: 5px solid black; background: white; display: none; }
        
        #comment-section { flex-grow: 1; display: none; flex-direction: column; max-width: 30%; border-left: 2px solid black; padding-left: 15px; }
        #comment-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.85rem; }
        .comment-item { padding: 8px; border-bottom: 1px solid #ddd; word-wrap: break-word; cursor: pointer; }
        
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; border-top: 3px solid black; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .post-btn { background: black; color: white; border: none; padding: 12px 40px; font-weight: bold; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .post-btn:disabled { background: #666; cursor: not-allowed; }
        
        #auth-btn { position: fixed; bottom: 20px; right: 20px; background: black; color: white; border: none; padding: 10px 20px; font-size: 12px; cursor: pointer; z-index: 2000; font-weight: bold; }
        
        #middle-link-btn { 
            position: fixed; bottom: 20px; left: 20px; 
            background: white; color: black; border: 2px solid black; 
            padding: 10px 20px; font-size: 12px; cursor: pointer; 
            z-index: 2000; font-weight: bold; text-decoration: none;
            display: inline-block; font-family: 'Courier New', Courier, monospace;
        }
        #middle-link-btn:hover { background: #eee; }

        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid black; padding: 20px; z-index: 3000; width: 700px; max-height: 85vh; overflow-y: auto; box-shadow: 15px 15px 0px #000; }
        .input-box { padding: 8px; border: 2px solid black; font-family: inherit; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 15px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        .admin-tab-btn { background: #eee; border: 1px solid black; padding: 8px 15px; cursor: pointer; margin-right: 5px; font-weight: bold; }
        .active-tab { background: black; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div class="main-container">
        <div id="feed">
            <div id="sentinel"></div>
        </div>
        <div id="preview-area">
            <img id="upscaled-image" src="" alt="View">
            <div id="comment-section">
                <div id="reply-ui">
                    <input type="text" id="replyInput" placeholder="ENTER REPLY..." class="input-box" style="width:85%;">
                    <button class="post-btn" id="replyBtn" style="padding: 8px; width:95%; font-size: 0.75rem;">REPLY</button>
                </div>
                <div id="comment-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" id="postBtn">POST IMAGE</button>
    </div>

    <a href="https://thering1.github.io/themiddle.github.io/" id="middle-link-btn">THE MIDDLE</a>
    <button id="auth-btn">SIGN IN</button>

    <div id="admin-modal">
        <div id="login-form">
            <h3>SIGN IN</h3>
            <input type="text" id="adminUser" placeholder="Username" class="input-box"><br>
            <input type="password" id="adminPass" placeholder="Password" class="input-box"><br>
            <button id="loginBtn" class="post-btn">LOGIN</button>
            <button id="closeModalBtn" style="border:none; background:none; cursor:pointer; text-decoration:underline; margin-left:10px;">Cancel</button>
        </div>

        <div id="admin-tools" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 3px solid black; padding-bottom: 15px;">
                <h3 id="user-welcome" style="margin:0;"></h3>
                <div>
                    <button id="collapseBtn" style="border:2px solid black; padding:5px; cursor:pointer; font-weight:bold;">COLLAPSE</button>
                    <button id="logoutBtn" style="background:red; color:white; border:none; padding:5px; cursor:pointer; margin-left:10px;">LOGOUT</button>
                </div>
            </div>
            
            <div id="lord-tabs" style="display:none; margin:15px 0;">
                <button class="admin-tab-btn active-tab" id="btn-acc">Accounts</button>
                <button class="admin-tab-btn" id="btn-bans">Banned IDs</button>
            </div>

            <div id="tab-accounts" style="display:none;">
                <div style="background:#f0f0f0; padding:15px; border:2px dashed black; margin-bottom:20px;">
                    <h4 style="margin-top:0;">REGISTER NEW ACCOUNT</h4>
                    <input type="text" id="regDisp" placeholder="Display Name" class="input-box" style="width:130px;">
                    <input type="text" id="regUser" placeholder="Username" class="input-box" style="width:130px;">
                    <input type="text" id="regPass" placeholder="Password" class="input-box" style="width:130px;">
                    <input type="text" id="regRank" placeholder="Rank" class="input-box" style="width:100px;">
                    <button id="createAccBtn" class="post-btn" style="padding:8px 15px;">CREATE</button>
                </div>
                <h4>USER DIRECTORY</h4>
                <table>
                    <thead><tr><th>Display Name</th><th>Username</th><th>Password</th><th>Rank</th><th>Action</th></tr></thead>
                    <tbody id="acc-body"></tbody>
                </table>
            </div>

            <div id="tab-bans" style="display:none;">
                <h4>ACTIVE BANS</h4>
                <table><thead><tr><th>Fingerprint ID</th><th>Action</th></tr></thead><tbody id="ban-body"></tbody></table>
            </div>

            <div id="student-view" style="display:none; margin-top:15px;">
                <p><i>Membership active.</i></p>
                <input type="password" id="changePass" placeholder="New Password" class="input-box"><br>
                <button id="updatePassBtn" class="post-btn" style="padding:8px;">Update My Password</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off, remove, set, get, onValue, query, orderByChild, limitToLast, endBefore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcjwKFOaKas5SCxoZg1Tgb6G58YCpmmTc",
            authDomain: "ring-data-789e9.firebaseapp.com",
            databaseURL: "https://ring-data-789e9-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "ring-data-789e9",
            storageBucket: "ring-data-789e9.firebasestorage.app",
            messagingSenderId: "97192604147",
            appId: "1:97192604147:web:071c1fdcf08ea667d3e286"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = null;
        let currentPostId = null;
        let currentCommentRef = null;
        let lastTimestamp = null;
        let isLoading = false;
        let cooldownTime = 0;
        const myFingerprint = btoa(navigator.userAgent).substring(0, 16);

        // --- Sanitization Tool ---
        const sanitize = (str) => {
            const div = document.createElement('div');
            div.textContent = str || "";
            return div.innerHTML;
        };

        // --- FEED & INFINITE SCROLL ---
        async function loadPosts() {
            if (isLoading) return;
            isLoading = true;
            try {
                let q = lastTimestamp 
                    ? query(ref(db, 'posts'), orderByChild('timestamp'), endBefore(lastTimestamp), limitToLast(20))
                    : query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(20));

                const snap = await get(q);
                const batch = [];
                snap.forEach(child => { batch.push({ key: child.key, ...child.val() }); });
                batch.reverse().forEach(post => { renderPost(post); lastTimestamp = post.timestamp; });
            } catch (e) { console.error("Load error:", e); }
            isLoading = false;
        }

        function renderPost(post) {
            if (document.getElementById(`thumb-${post.key}`)) return;
            const img = document.createElement('img');
            img.src = post.image;
            img.className = 'post-image';
            img.id = `thumb-${post.key}`;
            img.onclick = () => openPreview(post.image, post.key);
            img.oncontextmenu = (e) => {
                e.preventDefault();
                if (currentUser?.rank === 'Lord' && confirm(`Ban device ${post.posterId}?`)) set(ref(db, `bans/${post.posterId}`), true);
            };
            document.getElementById('feed').appendChild(img);
        }

        const observer = new IntersectionObserver(ent => { if (ent[0].isIntersecting) loadPosts(); }, { threshold: 0.1 });
        observer.observe(document.getElementById('sentinel'));

        // --- POSTING ---
        const handlePost = async () => {
            const banCheck = await get(ref(db, `bans/${myFingerprint}`));
            if (banCheck.exists()) return alert("Your ID is banned from posting.");
            
            const file = document.getElementById('imageInput').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const imgData = e.target.result;
                const checkSnap = await get(query(ref(db, 'posts'), limitToLast(100)));
                let isDup = false;
                checkSnap.forEach(c => { if(c.val().image === imgData) isDup = true; });
                if(isDup) return alert("Error: Image already exists in The Ring.");

                await push(ref(db, 'posts'), { image: imgData, timestamp: Date.now(), posterId: myFingerprint });
                startCooldown();
                location.reload();
            };
            reader.readAsDataURL(file);
        };

        function startCooldown() {
            cooldownTime = 120;
            const btn = document.getElementById('postBtn');
            btn.disabled = true;
            const timer = setInterval(() => {
                cooldownTime--;
                btn.innerText = `WAIT [${cooldownTime}s]`;
                if (cooldownTime <= 0) { clearInterval(timer); btn.disabled = false; btn.innerText = "POST IMAGE"; }
            }, 1000);
        }

       // --- COMMENT LOGIC ---
        function openPreview(url, id) {
            currentPostId = id;
            const img = document.getElementById('upscaled-image');
            img.src = url; img.style.display = 'block';
            document.getElementById('comment-section').style.display = 'flex';
            
            const list = document.getElementById('comment-list');
            list.innerHTML = '';
            if (currentCommentRef) off(currentCommentRef);
            
            currentCommentRef = ref(db, `comments/${id}`);
            onChildAdded(currentCommentRef, snap => {
                const c = snap.val();
                const div = document.createElement('div');
                div.className = 'comment-item';
                
                let content = "";
                if (c.display_name && c.display_name.trim() !== "") {
                    // Check if they have a rank/position
                    const position = (c.rank && c.rank.trim() !== "") 
                        ? `${sanitize(c.rank)} of the Ring` 
                        : "";
                    
                    const header = position 
                        ? `${sanitize(c.display_name)}, ${position}` 
                        : sanitize(c.display_name);
                        
                    content = `> <b>${header}:</b> ${sanitize(c.text)}`;
                } else {
                    // Anonymous/Guest view
                    content = `> ${sanitize(c.text)}`;
                }
                
                div.innerHTML = content;
                
                // Keep the deletion logic for high-ranking members
                div.onclick = () => { 
                    if(['Lord','Maestro','Docente'].includes(currentUser?.rank)) {
                        if(confirm("Delete this comment?")) {
                            remove(ref(db, `comments/${id}/${snap.key}`));
                            div.remove();
                        }
                    }
                };
                list.prepend(div);
            });
        }
        const postReply = () => {
            const text = document.getElementById('replyInput').value.trim();
            if (!text || !currentPostId) return;
            push(ref(db, `comments/${currentPostId}`), {
                text, 
                display_name: currentUser ? currentUser.display_name : '', 
                rank: currentUser ? currentUser.rank : '', 
                timestamp: Date.now()
            });
            document.getElementById('replyInput').value = '';
        };

        // --- ADMIN SUITE ---
        const showTab = (tab) => {
            document.getElementById('tab-accounts').style.display = tab === 'accounts' ? 'block' : 'none';
            document.getElementById('tab-bans').style.display = tab === 'bans' ? 'block' : 'none';
            document.getElementById('btn-acc').className = tab === 'accounts' ? 'admin-tab-btn active-tab' : 'admin-tab-btn';
            document.getElementById('btn-bans').className = tab === 'bans' ? 'admin-tab-btn active-tab' : 'admin-tab-btn';

            if (tab === 'accounts') {
                onValue(ref(db, 'users'), snap => {
                    const body = document.getElementById('acc-body'); body.innerHTML = '';
                    snap.forEach(child => {
                        const u = child.key; const d = child.val();
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><input type="text" id="ed-disp-${u}" value="${sanitize(d.display_name)}" style="width:100px;"></td>
                            <td>${sanitize(u)}</td>
                            <td><input type="text" id="ed-pass-${u}" value="${sanitize(d.password)}" style="width:100px;"></td>
                            <td><input type="text" id="ed-rank-${u}" value="${sanitize(d.rank)}" style="width:100px;"></td>
                        `;
                        const actTd = document.createElement('td');
                        const sBtn = document.createElement('button'); sBtn.textContent = "SAVE"; sBtn.onclick = () => saveEdit(u);
                        const dBtn = document.createElement('button'); dBtn.textContent = "X"; dBtn.style.color="red"; dBtn.onclick = () => delAcc(u);
                        actTd.append(sBtn, dBtn);
                        row.appendChild(actTd);
                        body.appendChild(row);
                    });
                });
            }
            if (tab === 'bans') {
                onValue(ref(db, 'bans'), snap => {
                    const body = document.getElementById('ban-body'); body.innerHTML = '';
                    snap.forEach(b => { 
                        const row = document.createElement('tr');
                        row.innerHTML = `<td>${sanitize(b.key)}</td>`;
                        const td = document.createElement('td');
                        const ubBtn = document.createElement('button'); ubBtn.textContent = "Lift Ban"; ubBtn.onclick = () => unban(b.key);
                        td.appendChild(ubBtn);
                        row.appendChild(td);
                        body.appendChild(row);
                    });
                });
            }
        };

        const saveEdit = async (u) => {
            const d = document.getElementById(`ed-disp-${u}`).value, p = document.getElementById(`ed-pass-${u}`).value, r = document.getElementById(`ed-rank-${u}`).value;
            await set(ref(db, `users/${u}`), { display_name: d, password: p, rank: r });
            alert("Saved.");
        };

        const delAcc = (u) => { if(confirm("Delete?")) remove(ref(db, `users/${u}`)); };
        const unban = (id) => remove(ref(db, `bans/${id}`));

        const attemptLogin = async () => {
            const u = document.getElementById('adminUser').value, p = document.getElementById('adminPass').value;
            const snap = await get(ref(db, `users/${u}`));
            if (snap.exists() && snap.val().password === p) {
                currentUser = snap.val(); currentUser.username = u;
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('user-welcome').innerText = `${currentUser.display_name} [${currentUser.rank}]`;
                document.getElementById('auth-btn').innerText = "ACCOUNT INFO";
                if (currentUser.rank === 'Lord') { document.getElementById('lord-tabs').style.display = 'block'; showTab('accounts'); }
                else { document.getElementById('student-view').style.display = 'block'; }
            } else alert("Denied.");
        };

        const toggleModal = () => { 
            const m = document.getElementById('admin-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block';
            if (currentUser) document.getElementById('auth-btn').innerText = m.style.display === 'block' ? "COLLAPSE INFO" : "ACCOUNT INFO";
        };

        // --- Event Listeners ---
        document.getElementById('postBtn').onclick = handlePost;
        document.getElementById('replyBtn').onclick = postReply;
        document.getElementById('auth-btn').onclick = toggleModal;
        document.getElementById('loginBtn').onclick = attemptLogin;
        document.getElementById('closeModalBtn').onclick = toggleModal;
        document.getElementById('collapseBtn').onclick = toggleModal;
        document.getElementById('logoutBtn').onclick = () => location.reload();
        document.getElementById('btn-acc').onclick = () => showTab('accounts');
        document.getElementById('btn-bans').onclick = () => showTab('bans');
        document.getElementById('createAccBtn').onclick = async () => {
            const d = document.getElementById('regDisp').value, u = document.getElementById('regUser').value, p = document.getElementById('regPass').value, r = document.getElementById('regRank').value;
            if(!u || !p) return alert("Fill required fields.");
            await set(ref(db, `users/${u}`), { display_name: d, password: p, rank: r });
            alert("Registered.");
        };
        document.getElementById('updatePassBtn').onclick = async () => {
            const newP = document.getElementById('changePass').value;
            if(!newP) return;
            await set(ref(db, `users/${currentUser.username}/password`), newP);
            alert("Password updated.");
        };
        document.getElementById('upscaled-image').oncontextmenu = (e) => {
            e.preventDefault();
            if (['Lord','Maestro'].includes(currentUser?.rank) && confirm("Erase post?")) {
                remove(ref(db, `posts/${currentPostId}`));
                remove(ref(db, `comments/${currentPostId}`));
                location.reload();
            }
        };

    </script>
</body>
</html>
