<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <link rel="icon" type="image/png" href="The_Ring_Icon.png">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { width: 100%; background: white; padding-top: 20px; z-index: 100; text-align: center; flex-shrink: 0; }
        h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .black-line { width: 90%; height: 6px; background: black; margin: 15px auto 0; }

        .main-container { display: flex; flex-grow: 1; overflow: hidden; width: 100%; }
        #feed { width: 400px; display: flex; flex-direction: column; align-items: flex-start; overflow-y: auto; padding: 20px 20px 150px 5%; gap: 30px; border-right: 2px solid #eee; scroll-behavior: smooth; }
        .post-image { width: 300px; height: 300px; object-fit: cover; border: 3px solid #000; cursor: pointer; flex-shrink: 0; background: #f9f9f9; }
        #sentinel { width: 100%; height: 50px; flex-shrink: 0; }

        #preview-area { flex-grow: 1; display: flex; padding: 20px; gap: 20px; background: #fafafa; overflow: hidden; position: relative; }
        #upscaled-image { max-width: 65%; max-height: 80vh; object-fit: contain; border: 5px solid black; background: white; display: none; }
        
        #comment-section { flex-grow: 1; display: none; flex-direction: column; max-width: 30%; border-left: 2px solid black; padding-left: 15px; }
        #comment-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.85rem; }
        .comment-item { padding: 8px; border-bottom: 1px solid #ddd; word-wrap: break-word; cursor: pointer; }
        
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; border-top: 3px solid black; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .post-btn { background: black; color: white; border: none; padding: 12px 40px; font-weight: bold; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .post-btn:disabled { background: #666; cursor: not-allowed; }
        
        #auth-btn { position: fixed; bottom: 20px; right: 20px; background: black; color: white; border: none; padding: 10px 20px; font-size: 12px; cursor: pointer; z-index: 2000; font-weight: bold; }
        #middle-link-btn { position: fixed; bottom: 20px; left: 20px; background: white; color: black; border: 2px solid black; padding: 10px 20px; font-size: 12px; cursor: pointer; z-index: 2000; font-weight: bold; text-decoration: none; display: inline-block; font-family: 'Courier New', Courier, monospace; }

        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid black; padding: 20px; z-index: 3000; width: 700px; max-height: 85vh; overflow-y: auto; box-shadow: 15px 15px 0px #000; }
        .input-box { padding: 8px; border: 2px solid black; font-family: inherit; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 15px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div class="main-container">
        <div id="feed">
            <div id="sentinel"></div>
        </div>
        <div id="preview-area">
            <img id="upscaled-image" src="" alt="View">
            <div id="comment-section">
                <div id="reply-ui">
                    <input type="text" id="replyInput" placeholder="ENTER REPLY..." class="input-box" style="width:85%;">
                    <button class="post-btn" id="replyBtn" style="padding: 8px; width:95%; font-size: 0.75rem;">REPLY</button>
                </div>
                <div id="comment-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" id="postBtn">POST IMAGE</button>
    </div>

    <a href="https://thering1.github.io/themiddle.github.io/" id="middle-link-btn">THE MIDDLE</a>
    <button id="auth-btn">SIGN IN</button>

    <div id="admin-modal">
        <div id="login-form">
            <h3>SIGN IN</h3>
            <input type="text" id="adminUser" placeholder="Username" class="input-box"><br>
            <input type="password" id="adminPass" placeholder="Password" class="input-box"><br>
            <button id="loginBtn" class="post-btn">LOGIN</button>
            <button id="closeModalBtn" style="border:none; background:none; cursor:pointer; text-decoration:underline; margin-left:10px;">Cancel</button>
        </div>

        <div id="admin-tools" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 3px solid black; padding-bottom: 15px;">
                <h3 id="user-welcome" style="margin:0;"></h3>
                <div>
                    <button id="collapseBtn" style="border:2px solid black; padding:5px; cursor:pointer; font-weight:bold;">COLLAPSE</button>
                    <button id="logoutBtn" style="background:red; color:white; border:none; padding:5px; cursor:pointer; margin-left:10px;">LOGOUT</button>
                </div>
            </div>
            <div id="lord-tools" style="display:none; margin-top:15px;">
                <h4>USER DIRECTORY (ACCOUNT DB)</h4>
                <div style="background:#f0f0f0; padding:10px; border:2px dashed black; margin-bottom:10px;">
                    <input type="text" id="regDisp" placeholder="Disp Name" class="input-box" style="width:100px;">
                    <input type="text" id="regUser" placeholder="User" class="input-box" style="width:100px;">
                    <input type="text" id="regPass" placeholder="Pass" class="input-box" style="width:100px;">
                    <input type="text" id="regRank" placeholder="Rank" class="input-box" style="width:80px;">
                    <input type="text" id="regFinger" placeholder="Finger" class="input-box" style="width:80px;">
                    <button id="createAccBtn" class="post-btn" style="padding:5px;">ADD</button>
                </div>
                <table>
                    <thead><tr><th>Display</th><th>User</th><th>Rank</th><th>Finger</th><th>Action</th></tr></thead>
                    <tbody id="acc-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off, remove, set, get, onValue, query, orderByChild, limitToLast, endBefore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG A: RING (Images/Comments)
        const ringConfig = {
            apiKey: "AIzaSyCcjwKFOaKas5SCxoZg1Tgb6G58YCpmmTc",
            authDomain: "ring-data-789e9.firebaseapp.com",
            databaseURL: "https://ring-data-789e9-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "ring-data-789e9"
        };

        // CONFIG B: ACCOUNTS (User Info)
        const accountConfig = {
            apiKey: "AIzaSyDHSXFPCiG2kjRAFzqUJn1OQoXD1bCtfH8",
            authDomain: "account-data-54450.firebaseapp.com",
            databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "account-data-54450"
        };

        const ringApp = initializeApp(ringConfig, "ringApp");
        const accountApp = initializeApp(accountConfig, "accountApp");

        const db = getDatabase(ringApp);
        const userDb = getDatabase(accountApp);
        
        let currentUser = null;
        let currentPostId = null;
        let currentCommentRef = null;
        let lastTimestamp = null;
        let isLoading = false;
        const myFingerprint = btoa(navigator.userAgent).substring(0, 16);

        const sanitize = (str) => {
            const div = document.createElement('div');
            div.textContent = str || "";
            return div.innerHTML;
        };

        // --- FEED ---
        async function loadPosts() {
            if (isLoading) return;
            isLoading = true;
            try {
                let q = lastTimestamp 
                    ? query(ref(db, 'posts'), orderByChild('timestamp'), endBefore(lastTimestamp), limitToLast(20))
                    : query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(20));
                const snap = await get(q);
                const batch = [];
                snap.forEach(child => { batch.push({ key: child.key, ...child.val() }); });
                batch.reverse().forEach(post => { renderPost(post); lastTimestamp = post.timestamp; });
            } catch (e) { console.error(e); }
            isLoading = false;
        }

        function renderPost(post) {
            if (document.getElementById(`thumb-${post.key}`)) return;
            const img = document.createElement('img');
            img.src = post.image;
            img.className = 'post-image';
            img.id = `thumb-${post.key}`;
            img.onclick = () => openPreview(post.image, post.key);
            document.getElementById('feed').appendChild(img);
        }

        const observer = new IntersectionObserver(ent => { if (ent[0].isIntersecting) loadPosts(); }, { threshold: 0.1 });
        observer.observe(document.getElementById('sentinel'));

        // --- COMMENTS (FORMAT: Name, Rank of the Finger) ---
        function openPreview(url, id) {
            currentPostId = id;
            document.getElementById('upscaled-image').src = url;
            document.getElementById('upscaled-image').style.display = 'block';
            document.getElementById('comment-section').style.display = 'flex';
            
            const list = document.getElementById('comment-list');
            list.innerHTML = '';
            if (currentCommentRef) off(currentCommentRef);
            
            currentCommentRef = ref(db, `comments/${id}`);
            onChildAdded(currentCommentRef, snap => {
                const c = snap.val();
                const div = document.createElement('div');
                div.className = 'comment-item';
                
                let header = "Anonymous";
                if (c.display_name) {
                    header = `${sanitize(c.display_name)}, ${sanitize(c.rank)} of the ${sanitize(c.finger)}`;
                }
                
                div.innerHTML = `> <b>${header}:</b> ${sanitize(c.text)}`;
                div.onclick = () => { if(['Lord','Maestro'].includes(currentUser?.rank)) remove(ref(db, `comments/${id}/${snap.key}`)); };
                list.prepend(div);
            });
        }

        document.getElementById('replyBtn').onclick = () => {
            const text = document.getElementById('replyInput').value.trim();
            if (!text || !currentPostId) return;
            const payload = { text, timestamp: Date.now() };
            if (currentUser) {
                payload.display_name = currentUser.display_name;
                payload.rank = currentUser.rank;
                payload.finger = currentUser.finger;
            }
            push(ref(db, `comments/${currentPostId}`), payload);
            document.getElementById('replyInput').value = '';
        };

        // --- AUTH (NEW DATABASE HIERARCHY) ---
        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const snap = await get(ref(userDb, `users/${u}`)); // users > username
            
            if (snap.exists() && snap.val().password === p) {
                currentUser = snap.val();
                currentUser.username = u;
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('user-welcome').innerText = `${currentUser.display_name} [${currentUser.rank}]`;
                document.getElementById('auth-btn').innerText = "ACCOUNT INFO";
                if (currentUser.rank === 'Lord') {
                    document.getElementById('lord-tools').style.display = 'block';
                    loadUserDir();
                }
            } else alert("Access Denied.");
        };

        function loadUserDir() {
            onValue(ref(userDb, 'users'), snap => {
                const body = document.getElementById('acc-body'); body.innerHTML = '';
                snap.forEach(child => {
                    const u = child.key; const d = child.val();
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${sanitize(d.display_name)}</td><td>${sanitize(u)}</td><td>${sanitize(d.rank)}</td><td>${sanitize(d.finger)}</td>`;
                    const delTd = document.createElement('td');
                    const delBtn = document.createElement('button'); delBtn.textContent = "X"; delBtn.onclick = () => remove(ref(userDb, `users/${u}`));
                    delTd.appendChild(delBtn); row.appendChild(delTd);
                    body.appendChild(row);
                });
            });
        }

        // --- POSTING ---
        document.getElementById('postBtn').onclick = async () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                await push(ref(db, 'posts'), { image: e.target.result, timestamp: Date.now(), posterId: myFingerprint });
                location.reload();
            };
            reader.readAsDataURL(file);
        };

        // --- UI ---
        document.getElementById('auth-btn').onclick = () => {
            const m = document.getElementById('admin-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('admin-modal').style.display = 'none';
        document.getElementById('collapseBtn').onclick = () => document.getElementById('admin-modal').style.display = 'none';
        document.getElementById('logoutBtn').onclick = () => location.reload();
        document.getElementById('createAccBtn').onclick = async () => {
            const u = document.getElementById('regUser').value, d = document.getElementById('regDisp').value, p = document.getElementById('regPass').value, r = document.getElementById('regRank').value, f = document.getElementById('regFinger').value;
            if(!u || !p) return;
            await set(ref(userDb, `users/${u}`), { display_name: d, password: p, rank: r, finger: f });
            alert("Sibling Added.");
        };

    </script>
</body>
</html>
