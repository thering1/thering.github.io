<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica', sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Keeps the UI static while the feed scrolls */
        }

        /* 1. THE HEADER & THE LINE */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: white; /* Matches body to 'hide' images passing under */
            padding-top: 20px;
            z-index: 100;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .black-line {
            width: 90%;
            height: 5px;
            background-color: black;
            margin: 15px auto 0 auto;
        }

        /* 2. THE FEED (Left-aligned, Bottom-up) */
        #feed {
            flex-grow: 1;
            display: flex;
            flex-direction: column; 
            align-items: flex-start; /* Aligns images to the LEFT */
            overflow-y: auto;
            padding: 100px 5% 150px 5%; /* Top padding starts images below the line */
            gap: 30px;
        }

        /* This pushes content to the bottom when the feed is empty */
        .spacer {
            flex-grow: 1;
        }

        .post-image {
            width: 350px; /* Uniform width */
            height: 350px; /* Uniform height */
            object-fit: cover;
            border: 2px solid #000;
            flex-shrink: 0; /* Prevents images from squishing */
        }

        /* 3. THE CONTROLS */
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        #imageInput {
            font-size: 0.9rem;
        }

        .post-btn {
            background: black;
            color: white;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .post-btn:hover {
            background: #333;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div id="feed">
        <div class="spacer"></div>
        </div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" onclick="postImage()">Post</button>
    </div>

    <script>
        const feed = document.getElementById('feed');
        const imageInput = document.getElementById('imageInput');

        // Load saved images from LocalStorage
        window.onload = () => {
            const savedPosts = JSON.parse(localStorage.getItem('theRingPosts')) || [];
            savedPosts.forEach(src => displayImage(src));
        };

        function postImage() {
            const file = imageInput.files[0];
            if (!file) {
                alert("Please select an image first.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const imageSrc = e.target.result;
                
                // 1. Save to local storage
                savePost(imageSrc);
                
                // 2. Add to feed
                displayImage(imageSrc);
                
                // 3. Reset input
                imageInput.value = "";

                // 4. Scroll to the bottom so the new post is visible
                feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
            };
            reader.readAsDataURL(file);
        }

        function displayImage(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'post-image';
            feed.appendChild(img);
        }

        function savePost(src) {
            const savedPosts = JSON.parse(localStorage.getItem('theRingPosts')) || [];
            savedPosts.push(src);
            localStorage.setItem('theRingPosts', JSON.stringify(savedPosts));
        }
    </script>
</body>
</html>
