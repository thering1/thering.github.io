<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { width: 100%; background: white; padding-top: 20px; z-index: 100; text-align: center; flex-shrink: 0; }
        h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .black-line { width: 90%; height: 6px; background: black; margin: 15px auto 0; }

        .main-container { display: flex; flex-grow: 1; overflow: hidden; width: 100%; }
        #feed { width: 400px; display: flex; flex-direction: column; align-items: flex-start; overflow-y: auto; padding: 20px 20px 150px 5%; gap: 30px; border-right: 2px solid #eee; }
        .post-image { width: 300px; height: 300px; object-fit: cover; border: 3px solid #000; cursor: pointer; }

        #preview-area { flex-grow: 1; display: flex; padding: 20px; gap: 20px; background: #fafafa; overflow: hidden; position: relative; }
        #upscaled-image { max-width: 65%; max-height: 80vh; object-fit: contain; border: 5px solid black; background: white; display: none; cursor: crosshair; }
        
        #comment-section { flex-grow: 1; display: none; flex-direction: column; max-width: 30%; border-left: 2px solid black; padding-left: 15px; }
        #comment-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.9rem; }
        .comment-item { padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; }
        .comment-item b { color: #000; }
        
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; border-top: 3px solid black; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .post-btn { background: black; color: white; border: none; padding: 12px 40px; font-weight: bold; cursor: pointer; font-family: inherit; }
        
        /* ADMIN PANEL STYLES */
        #admin-trigger { position: fixed; bottom: 10px; right: 10px; width: 20px; height: 20px; background: #000; cursor: pointer; z-index: 2000; opacity: 0.1; }
        #admin-trigger:hover { opacity: 1; }
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid black; padding: 20px; z-index: 3000; width: 400px; max-height: 80vh; overflow-y: auto; }
        .admin-row { margin-bottom: 10px; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 4px; text-align: left; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div class="main-container">
        <div id="feed"></div>
        <div id="preview-area">
            <img id="upscaled-image" src="" alt="Selected" oncontextmenu="handleRightClick(event)">
            <div id="comment-section">
                <div id="reply-ui">
                    <input type="text" id="replyInput" placeholder="ENTER REPLY..." style="width:90%; padding:5px; border:2px solid black;">
                    <button class="post-btn" id="replyBtn" style="padding: 5px; margin-top:5px; width:95%;">REPLY</button>
                </div>
                <div id="comment-list"></div>
            </div>
        </div>
    </div>

    <div class="controls" id="main-controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" id="postBtn">POST IMAGE</button>
    </div>

    <div id="admin-trigger" onclick="toggleAdminModal()"></div>

    <div id="admin-modal">
        <div id="login-form">
            <h3>SIGN IN</h3>
            <input type="text" id="adminUser" placeholder="Username"><br><br>
            <input type="password" id="adminPass" placeholder="Password"><br><br>
            <button onclick="attemptLogin()">Login</button>
            <button onclick="toggleAdminModal()">Close</button>
        </div>
        <div id="admin-tools" style="display:none;">
            <h3>ADMIN TOOLS</h3>
            <p id="user-welcome"></p>
            <div id="lord-only" style="display:none;">
                <hr>
                <h4>ADD ACCOUNT</h4>
                <input type="text" id="newDisp" placeholder="Display Name"><br>
                <input type="text" id="newUser" placeholder="Username"><br>
                <input type="text" id="newPass" placeholder="Password"><br>
                <button onclick="addAccount()">Create Student</button>
                <hr>
                <h4>VIEW ACCOUNTS</h4>
                <table id="accounts-table">
                    <thead><tr><th>Disp</th><th>User</th><th>Pass</th><th>Rank</th></tr></thead>
                    <tbody id="accounts-body"></tbody>
                </table>
            </div>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off, remove, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postsRef = ref(db, 'posts');
        
        let currentUser = null;
        let currentPostId = null;
        let currentCommentRef = null;

        // --- AUTH LOGIC ---
        window.toggleAdminModal = () => {
            const modal = document.getElementById('admin-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        };

        window.attemptLogin = async () => {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const userSnapshot = await get(ref(db, `users/${user}`));
            
            if (userSnapshot.exists() && userSnapshot.val().password === pass) {
                currentUser = userSnapshot.val();
                currentUser.username = user;
                showAdminTools();
            } else {
                alert("Invalid Credentials");
            }
        };

        function showAdminTools() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('admin-tools').style.display = 'block';
            document.getElementById('user-welcome').innerText = `Logged in as: ${currentUser.display_name} (${currentUser.rank})`;
            
            if (currentUser.rank === 'Lord') {
                document.getElementById('lord-only').style.display = 'block';
                loadAccounts();
            }
        }

        window.logout = () => { location.reload(); };

        // --- LORD TOOLS ---
        window.addAccount = () => {
            const user = document.getElementById('newUser').value;
            set(ref(db, `users/${user}`), {
                display_name: document.getElementById('newDisp').value,
                password: document.getElementById('newPass').value,
                rank: 'Student'
            });
            alert("Account Created");
            loadAccounts();
        };

        function loadAccounts() {
            onValue(ref(db, 'users'), (snapshot) => {
                const body = document.getElementById('accounts-body');
                body.innerHTML = '';
                snapshot.forEach((child) => {
                    const u = child.val();
                    const row = `<tr>
                        <td><input onchange="updateUser('${child.key}', 'display_name', this.value)" value="${u.display_name}"></td>
                        <td>${child.key}</td>
                        <td><input onchange="updateUser('${child.key}', 'password', this.value)" value="${u.password}"></td>
                        <td><input onchange="updateUser('${child.key}', 'rank', this.value)" value="${u.rank}"></td>
                    </tr>`;
                    body.innerHTML += row;
                });
            });
        }

        window.updateUser = (userKey, field, value) => {
            set(ref(db, `users/${userKey}/${field}`), value);
        };

        // --- FEED & MODERATION ---
        onChildAdded(postsRef, (snapshot) => {
            const img = document.createElement('img');
            img.src = snapshot.val().image;
            img.className = 'post-image';
            img.id = `thumb-${snapshot.key}`;
            img.onclick = () => openPreview(snapshot.val().image, snapshot.key);
            document.getElementById('feed').appendChild(img);
        });

        window.handleRightClick = (e) => {
            e.preventDefault();
            if (!currentUser || !['Lord', 'Maestro'].includes(currentUser.rank)) return;
            if (confirm("Delete this image and all comments?")) {
                remove(ref(db, `posts/${currentPostId}`));
                remove(ref(db, `comments/${currentPostId}`));
                document.getElementById(`thumb-${currentPostId}`).remove();
                document.getElementById('upscaled-image').style.display = 'none';
                document.getElementById('comment-section').style.display = 'none';
            }
        };

        function openPreview(url, id) {
            currentPostId = id;
            const previewImg = document.getElementById('upscaled-image');
            previewImg.src = url;
            previewImg.style.display = 'block';
            document.getElementById('comment-section').style.display = 'flex';
            const list = document.getElementById('comment-list');
            list.innerHTML = '';

            if (currentCommentRef) off(currentCommentRef);
            currentCommentRef = ref(db, `comments/${id}`);
            onChildAdded(currentCommentRef, (snap) => {
                const c = snap.val();
                const div = document.createElement('div');
                div.className = 'comment-item';
                // Formatting based on logged-in status
                if (c.rank) {
                    div.innerHTML = `<b>> ${c.display_name}, ${c.rank} of the Ring:</b> ${c.text}`;
                } else {
                    div.innerText = `> ${c.text}`;
                }
                
                div.onclick = () => {
                    if (currentUser && ['Lord', 'Maestro'].includes(currentUser.rank)) {
                        if (confirm("Delete comment?")) remove(ref(db, `comments/${id}/${snap.key}`));
                    }
                };
                list.prepend(div);
            });
        }

        // --- POSTING ---
        window.postReply = () => {
            const text = document.getElementById('replyInput').value;
            if (!text || !currentPostId) return;
            const payload = { text: text, timestamp: Date.now() };
            if (currentUser) {
                payload.display_name = currentUser.display_name;
                payload.rank = currentUser.rank;
            }
            push(ref(db, `comments/${currentPostId}`), payload);
            document.getElementById('replyInput').value = '';
        };

        window.postImage = () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                push(postsRef, { image: e.target.result, timestamp: Date.now() });
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('postBtn').onclick = window.postImage;
        document.getElementById('replyBtn').onclick = window.postReply;
    </script>
</body>
</html>
