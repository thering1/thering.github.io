<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #ffffff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER & BLACK LINE */
        .header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: white; 
            padding-top: 20px; 
            z-index: 100; 
            text-align: center; 
        }

        h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            font-weight: 900; 
            letter-spacing: 5px; 
            text-transform: uppercase;
        }

        .black-line { 
            width: 90%; 
            height: 6px; 
            background-color: black; 
            margin: 15px auto 0 auto; 
        }

        /* FEED (Left-aligned, Bottom-up) */
        #feed { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            overflow-y: auto; 
            padding: 120px 5% 180px 5%; 
            gap: 40px; 
        }

        .spacer { flex-grow: 1; order: -1; }

        .post-container {
            position: relative;
            flex-shrink: 0;
        }

        .post-image { 
            width: 350px; 
            height: 350px; 
            object-fit: cover; 
            border: 3px solid #000; 
            display: block;
        }

        /* CONTROLS */
        .controls { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: white; 
            padding: 25px; 
            border-top: 3px solid black; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            z-index: 100; 
        }

        .post-btn { 
            background: black; 
            color: white; 
            border: none; 
            padding: 12px 40px; 
            font-weight: bold; 
            font-family: inherit;
            cursor: pointer; 
        }

        .post-btn:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div id="feed">
        <div class="spacer"></div>
    </div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" id="postBtn">POST</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            // UPDATED REGION URL
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postsRef = ref(db, 'posts');
        const feed = document.getElementById('feed');
        const btn = document.getElementById('postBtn');

        // Listen for global posts
        onChildAdded(postsRef, (snapshot) => {
            const data = snapshot.val();
            displayImage(data.image);
        });

        window.postImage = () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert("Please select an image.");

            if (file.size > 1048576) {
                return alert("File too large! Keep it under 1MB.");
            }

            btn.disabled = true;
            btn.innerText = "POSTING...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;

                push(postsRef, {
                    image: base64Data,
                    timestamp: Date.now()
                }).then(() => {
                    btn.disabled = false;
                    btn.innerText = "POST";
                    document.getElementById('imageInput').value = "";
                });
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('postBtn').onclick = window.postImage;

        function displayImage(url) {
            const container = document.createElement('div');
            container.className = 'post-container';
            const img = document.createElement('img');
            img.src = url;
            img.className = 'post-image';
            container.appendChild(img);
            feed.appendChild(container);
            
            // Forces scroll to the newest image
            setTimeout(() => {
                feed.scrollTop = feed.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>
