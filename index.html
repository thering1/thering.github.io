<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ring</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .header { width: 100%; background: white; padding-top: 20px; z-index: 100; text-align: center; flex-shrink: 0; }
        h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .black-line { width: 90%; height: 6px; background: black; margin: 15px auto 0; }

        /* MAIN CONTENT SPLIT */
        .main-container { display: flex; flex-grow: 1; overflow: hidden; width: 100%; }

        /* LEFT FEED */
        #feed { width: 400px; display: flex; flex-direction: column; align-items: flex-start; overflow-y: auto; padding: 20px 20px 150px 5%; gap: 30px; border-right: 2px solid #eee; }
        .post-image { width: 300px; height: 300px; object-fit: cover; border: 3px solid #000; cursor: pointer; transition: transform 0.2s; }
        .post-image:hover { transform: scale(1.02); }

        /* RIGHT PREVIEW AREA */
        #preview-area { flex-grow: 1; display: flex; padding: 20px; gap: 20px; background: #fafafa; overflow: hidden; }
        #upscaled-image { max-width: 65%; max-height: 80vh; object-fit: contain; border: 5px solid black; background: white; display: none; }
        
        /* COMMENTS SECTION */
        #comment-section { flex-grow: 1; display: none; flex-direction: column; max-width: 30%; border-left: 2px solid black; padding-left: 15px; }
        #comment-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.9rem; }
        .comment-item { padding: 8px; border-bottom: 1px solid #ddd; word-wrap: break-word; }
        
        .reply-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .reply-input { padding: 10px; border: 2px solid black; font-family: inherit; }

        /* BOTTOM CONTROLS */
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; border-top: 3px solid black; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .post-btn { background: black; color: white; border: none; padding: 12px 40px; font-weight: bold; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE RING</h1>
        <div class="black-line"></div>
    </div>

    <div class="main-container">
        <div id="feed"></div>

        <div id="preview-area">
            <img id="upscaled-image" src="" alt="Selected">
            <div id="comment-section">
                <div class="reply-box">
                    <input type="text" id="replyInput" class="reply-input" placeholder="ENTER REPLY...">
                    <button class="post-btn" id="replyBtn" style="padding: 5px;">REPLY</button>
                </div>
                <div id="comment-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button class="post-btn" id="postBtn">POST IMAGE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHSN6HiR50_sFT7L8p0bOUVDBb3KBpJiY",
            authDomain: "the-ring-97f20.firebaseapp.com",
            projectId: "the-ring-97f20",
            storageBucket: "the-ring-97f20.firebasestorage.app",
            messagingSenderId: "254314705601",
            appId: "1:254314705601:web:80eea55a563f7a01f95a40",
            databaseURL: "https://the-ring-97f20-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postsRef = ref(db, 'posts');
        
        let currentPostId = null;
        let currentCommentRef = null;

        // LOAD FEED
        onChildAdded(postsRef, (snapshot) => {
            const postData = snapshot.val();
            const postId = snapshot.key;
            createThumbnail(postData.image, postId);
        });

        function createThumbnail(url, id) {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'post-image';
            img.onclick = () => openPreview(url, id);
            document.getElementById('feed').appendChild(img);
        }

        // PREVIEW & COMMENTS LOGIC
        function openPreview(url, id) {
            currentPostId = id;
            const previewImg = document.getElementById('upscaled-image');
            const commentSection = document.getElementById('comment-section');
            const commentList = document.getElementById('comment-list');
            
            previewImg.src = url;
            previewImg.style.display = 'block';
            commentSection.style.display = 'flex';
            commentList.innerHTML = ''; // Clear old comments

            // Stop listening to previous image comments
            if (currentCommentRef) off(currentCommentRef);

            // Listen to new image comments
            currentCommentRef = ref(db, `comments/${id}`);
            onChildAdded(currentCommentRef, (snapshot) => {
                const comment = snapshot.val();
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerText = `> ${comment.text}`;
                commentList.prepend(div); // Newest comments at top of list
            });
        }

        // POSTING IMAGE
        window.postImage = () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                push(postsRef, { image: e.target.result, timestamp: Date.now() });
                document.getElementById('imageInput').value = "";
            };
            reader.readAsDataURL(file);
        };

        // POSTING REPLY
        window.postReply = () => {
            const text = document.getElementById('replyInput').value;
            if (!text || !currentPostId) return;
            
            const replyRef = ref(db, `comments/${currentPostId}`);
            push(replyRef, { text: text, timestamp: Date.now() });
            document.getElementById('replyInput').value = '';
        };

        document.getElementById('postBtn').onclick = window.postImage;
        document.getElementById('replyBtn').onclick = window.postReply;
    </script>
</body>
</html>
